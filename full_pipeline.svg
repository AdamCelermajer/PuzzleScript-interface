<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1500" viewBox="0 0 2400 1500">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .section { fill: #eef6ff; stroke: #bfdbfe; stroke-width: 2; rx: 18; ry: 18; }
      .section-mid { fill: #f5f3ff; stroke: #ddd6fe; stroke-width: 2; rx: 18; ry: 18; }
      .section-right { fill: #ecfeff; stroke: #bae6fd; stroke-width: 2; rx: 18; ry: 18; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 14; ry: 14; }
      .box-alt { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 14; ry: 14; }
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .box-title { font: 700 21px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .text { font: 16px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .text-small { font: 15px 'Segoe UI', Arial, sans-serif; fill: #1e293b; }
      .label { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .arrow-dashed { stroke: #475569; stroke-width: 2.2; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2400" height="1500"/>

  <text class="title" x="1200" y="52" text-anchor="middle">PuzzleScript-interface - Full End-to-End Pipeline</text>
  <text class="subtitle" x="1200" y="84" text-anchor="middle">Learning mode + Solving mode + Prompting + LLM + Node engine + Persistence</text>

  <rect class="section" x="20" y="110" width="820" height="1330"/>
  <text class="subtitle" x="430" y="145" text-anchor="middle">Clients and Python Orchestration Layer</text>

  <rect class="section-mid" x="860" y="110" width="400" height="1330"/>
  <text class="subtitle" x="1060" y="145" text-anchor="middle">Prompting and LLM Layer</text>

  <rect class="section-right" x="1280" y="110" width="1100" height="1330"/>
  <text class="subtitle" x="1830" y="145" text-anchor="middle">Server Engine, Runtime State, and Artifacts</text>

  <rect class="box" x="60" y="180" width="300" height="95"/>
  <text class="box-title" x="210" y="215" text-anchor="middle">User / Researcher</text>
  <text class="text" x="210" y="244" text-anchor="middle">Runs server and agent modes</text>
  <text class="text" x="210" y="266" text-anchor="middle">Observes board and outputs</text>

  <rect class="box" x="60" y="300" width="300" height="180"/>
  <text class="box-title" x="210" y="335" text-anchor="middle">CLI Entry Points</text>
  <text class="text" x="80" y="365">- npm start -&gt; src/server.js</text>
  <text class="text" x="80" y="392">- python src/learning_mode.py</text>
  <text class="text" x="80" y="419">- python src/solving_mode.py</text>
  <text class="text" x="80" y="446">- mode, game, max_steps config</text>

  <rect class="box" x="60" y="510" width="300" height="150"/>
  <text class="box-title" x="210" y="545" text-anchor="middle">Thin JS Client</text>
  <text class="text" x="210" y="574" text-anchor="middle">src/client.js (optional)</text>
  <text class="text" x="210" y="598" text-anchor="middle">WASD/R/Z -&gt; POST /action</text>
  <text class="text" x="210" y="622" text-anchor="middle">POST /init by gameName</text>

  <rect class="box-alt" x="60" y="690" width="300" height="120"/>
  <text class="box-title" x="210" y="725" text-anchor="middle">PuzzleScript Sources</text>
  <text class="text" x="210" y="752" text-anchor="middle">games/*.txt</text>
  <text class="text" x="210" y="776" text-anchor="middle">Loaded by /init (gameName)</text>

  <rect class="box" x="400" y="180" width="420" height="520"/>
  <text class="box-title" x="610" y="215" text-anchor="middle">Learning Mode Loop (src/learning_mode.py)</text>
  <text class="text" x="420" y="245">- init: Server.init(game) -&gt; sessionId, board, legend</text>
  <text class="text" x="420" y="272">- step loop: act(board, local, subgoal)</text>
  <text class="text" x="420" y="299">- send action: Server.action(sessionId, action)</text>
  <text class="text" x="420" y="326">- append history: (prev_board, action, next_board)</text>
  <text class="text" x="420" y="353">- stuck handling: 3 unchanged steps -&gt; send R reset</text>
  <text class="text" x="420" y="388">Periodic analysis branch:</text>
  <text class="text" x="440" y="415">- every 5 steps: deduce_rules_from_history</text>
  <text class="text" x="440" y="442">- compress_rules</text>
  <text class="text" x="440" y="469">- plan_subgoal</text>
  <text class="text" x="420" y="504">Legend branch:</text>
  <text class="text" x="440" y="531">- at step &gt;= 10: infer_legend(first 10 transitions)</text>
  <text class="text" x="420" y="566">Finalization:</text>
  <text class="text" x="440" y="593">- max_steps -&gt; refine_and_complete_rules_and_legend</text>
  <text class="text" x="440" y="620">- save rules to rules/&lt;game&gt;_rules.txt</text>
  <text class="text" x="420" y="655">Terminates on mode win + game_complete or max_steps</text>

  <rect class="box" x="400" y="730" width="420" height="250"/>
  <text class="box-title" x="610" y="765" text-anchor="middle">Solving Mode Loop (src/solving_mode.py)</text>
  <text class="text" x="420" y="796">- init: Server.init(game)</text>
  <text class="text" x="420" y="823">- action loop: get_solving_act_prompt(board, legend, [], show_legend)</text>
  <text class="text" x="420" y="850">- parse one-char action (W/A/S/D/X/Z/R)</text>
  <text class="text" x="420" y="877">- POST /action and update board</text>
  <text class="text" x="420" y="904">- reset local state on level change</text>
  <text class="text" x="420" y="931">- stop on game_complete</text>
  <text class="text-small" x="420" y="962">Note: current implementation passes empty known_rules list.</text>

  <rect class="box" x="880" y="180" width="360" height="360"/>
  <text class="box-title" x="1060" y="215" text-anchor="middle">Prompt Builder Layer (src/prompts.py)</text>
  <text class="text" x="900" y="245">Learning prompts:</text>
  <text class="text" x="920" y="272">- get_plan_subgoal_prompt</text>
  <text class="text" x="920" y="299">- get_learning_act_prompt</text>
  <text class="text" x="920" y="326">- get_deduce_rules_prompt</text>
  <text class="text" x="920" y="353">- get_compress_rules_prompt</text>
  <text class="text" x="920" y="380">- get_infer_legend_prompt</text>
  <text class="text" x="920" y="407">- get_refine_rules_prompt</text>
  <text class="text" x="900" y="442">Solving prompt:</text>
  <text class="text" x="920" y="469">- get_solving_act_prompt</text>
  <text class="text" x="900" y="504">Includes strict output contracts:</text>
  <text class="text" x="920" y="531">single-char actions / JSON-only payloads</text>

  <rect class="box-alt" x="880" y="565" width="360" height="165"/>
  <text class="box-title" x="1060" y="600" text-anchor="middle">ACDL Specifications</text>
  <text class="text" x="900" y="630">- context.acdl: prompt templates</text>
  <text class="text" x="900" y="657">- main_loop.acdl: orchestration intent</text>
  <text class="text" x="900" y="684">Documents PlanSubgoal / LearningAct / DeduceRules flow</text>

  <rect class="box" x="880" y="760" width="360" height="215"/>
  <text class="box-title" x="1060" y="795" text-anchor="middle">LLM Client (src/llm_client.py)</text>
  <text class="text" x="900" y="825">- LlmClient._call(system, prompt, model_type)</text>
  <text class="text" x="900" y="852">- routes to litellm.completion(...)</text>
  <text class="text" x="900" y="879">- model_type=flash for actions/subgoals</text>
  <text class="text" x="900" y="906">- model_type=pro for rule analysis/refinement</text>
  <text class="text" x="900" y="933">- Config loads GOOGLE_API_KEY from .env</text>
  <text class="text" x="900" y="960">- Server helper wraps POST /init and /action</text>

  <rect class="box" x="880" y="1000" width="360" height="190"/>
  <text class="box-title" x="1060" y="1035" text-anchor="middle">Gemini via LiteLLM</text>
  <text class="text" x="900" y="1065">Flash model:</text>
  <text class="text" x="920" y="1092">- fast action selection and subgoal planning</text>
  <text class="text" x="900" y="1119">Pro model:</text>
  <text class="text" x="920" y="1146">- rule deduction, compression, final audit</text>
  <text class="text" x="900" y="1173">Returns: action chars or strict JSON objects</text>

  <rect class="box" x="1320" y="180" width="500" height="330"/>
  <text class="box-title" x="1570" y="215" text-anchor="middle">Express API Server (src/server.js)</text>
  <text class="text" x="1340" y="245">Endpoints:</text>
  <text class="text" x="1360" y="272">- POST /init { gameSource | gameName }</text>
  <text class="text" x="1360" y="299">- POST /action { sessionId, action }</text>
  <text class="text" x="1360" y="326">- GET /observe?sessionId=...</text>
  <text class="text" x="1340" y="361">Action mapping: up/down/left/right/reset/undo/action</text>
  <text class="text" x="1340" y="388">Tick loop handles AGAIN animation and level transitions</text>
  <text class="text" x="1340" y="415">Responses include board, boardJSON, level, status, message</text>
  <text class="text" x="1340" y="442">CORS enabled, JSON request parsing, per-session routing</text>
  <text class="text" x="1340" y="469">Logs every INIT/ACTION event to game_history.jsonl</text>

  <rect class="box" x="1320" y="540" width="500" height="310"/>
  <text class="box-title" x="1570" y="575" text-anchor="middle">PuzzleScript Engine Runtime</text>
  <text class="text" x="1340" y="605">- Parser.parse(normalized game source)</text>
  <text class="text" x="1340" y="632">- SessionHandler tracks messages, win, level changes</text>
  <text class="text" x="1340" y="659">- GameEngine(gameData, handler)</text>
  <text class="text" x="1340" y="686">- setLevel, press(INPUT_BUTTON), tick()</text>
  <text class="text" x="1340" y="713">- render(): top-down sprite-to-char mapping</text>
  <text class="text" x="1340" y="740">- renderJSON(): per-cell object content [{x,y,content}]</text>
  <text class="text" x="1340" y="767">- getDisplayLegend(): char -&gt; object names</text>
  <text class="text" x="1340" y="794">- supports message levels and game completion signals</text>
  <text class="text" x="1340" y="821">- restart uses hard level reload workaround</text>

  <rect class="box-alt" x="1320" y="880" width="500" height="120"/>
  <text class="box-title" x="1570" y="915" text-anchor="middle">In-Memory Session Store</text>
  <text class="text" x="1340" y="945">gameSessions: Map&lt;sessionId, Session&gt;</text>
  <text class="text" x="1340" y="972">Supports concurrent sessions for Python and JS clients</text>

  <rect class="box-alt" x="1320" y="1030" width="500" height="220"/>
  <text class="box-title" x="1570" y="1065" text-anchor="middle">API Data Contract (runtime payloads)</text>
  <text class="text" x="1340" y="1095">Init response: sessionId, board, boardJSON, level, legend</text>
  <text class="text" x="1340" y="1122">Action response: board, boardJSON, level, status, message</text>
  <text class="text" x="1340" y="1149">Observe response: board, boardJSON, level, legend</text>
  <text class="text" x="1340" y="1176">Board representation flows as ASCII + coordinate-annotated in Python</text>
  <text class="text" x="1340" y="1203">Rule outputs flow as strict JSON from model to learner</text>
  <text class="text" x="1340" y="1230">History tuple format in learner: (prev_board, action, next_board)</text>

  <rect class="box" x="1860" y="180" width="430" height="120"/>
  <text class="box-title" x="2075" y="215" text-anchor="middle">game_history.jsonl</text>
  <text class="text" x="1880" y="244">Appended on /init and /action</text>
  <text class="text" x="1880" y="271">timestamp, sessionId, level, action, board, boardJSON</text>

  <rect class="box" x="1860" y="330" width="430" height="130"/>
  <text class="box-title" x="2075" y="365" text-anchor="middle">rules/&lt;game&gt;_rules.txt</text>
  <text class="text" x="1880" y="394">Written by learning mode (_save_rules)</text>
  <text class="text" x="1880" y="421">Contains deduced/compressed/final rules + metadata</text>
  <text class="text" x="1880" y="448">Loaded on startup of learning mode</text>

  <rect class="box" x="1860" y="490" width="430" height="110"/>
  <text class="box-title" x="2075" y="525" text-anchor="middle">Environment / Credentials</text>
  <text class="text" x="1880" y="554">GOOGLE_API_KEY from .env</text>
  <text class="text" x="1880" y="581">Injected into GEMINI_API_KEY for LiteLLM</text>

  <rect class="box-alt" x="1860" y="1030" width="430" height="210"/>
  <text class="box-title" x="2075" y="1065" text-anchor="middle">Legend for this diagram</text>
  <line class="arrow" x1="1885" y1="1098" x2="1990" y2="1098"/>
  <text class="label" x="2010" y="1103">Primary runtime request/response flow</text>
  <line class="arrow-dashed" x1="1885" y1="1138" x2="1990" y2="1138"/>
  <text class="label" x="2010" y="1143">Periodic/derived flow or specification influence</text>
  <line class="arrow" x1="1885" y1="1178" x2="1990" y2="1178"/>
  <text class="label" x="2010" y="1183">Persistence writes/reads</text>
  <text class="text-small" x="1885" y="1212">This SVG reflects current repository implementation.</text>

  <line class="arrow" x1="210" y1="275" x2="210" y2="300"/>
  <text class="label" x="224" y="292">run commands</text>

  <line class="arrow" x1="360" y1="360" x2="400" y2="360"/>
  <text class="label" x="367" y="347">learn mode</text>

  <line class="arrow" x1="360" y1="410" x2="400" y2="840"/>
  <text class="label" x="365" y="620">solve mode</text>

  <line class="arrow" x1="360" y1="330" x2="1320" y2="250"/>
  <text class="label" x="760" y="270">start Node server</text>

  <line class="arrow" x1="360" y1="570" x2="1320" y2="330"/>
  <text class="label" x="760" y="400">POST /init, /action</text>

  <line class="arrow" x1="360" y1="750" x2="1320" y2="280"/>
  <text class="label" x="770" y="620">/init loads game file by name</text>

  <line class="arrow" x1="820" y1="305" x2="880" y2="305"/>
  <text class="label" x="826" y="292">build prompts</text>

  <line class="arrow" x1="820" y1="845" x2="880" y2="450"/>
  <text class="label" x="835" y="645">solving prompt</text>

  <line class="arrow-dashed" x1="1060" y1="565" x2="1060" y2="540"/>
  <text class="label" x="1074" y="556">specifies structure</text>

  <line class="arrow" x1="1060" y1="540" x2="1060" y2="760"/>
  <text class="label" x="1074" y="670">system+user prompt</text>

  <line class="arrow" x1="1060" y1="975" x2="1060" y2="1000"/>
  <text class="label" x="1074" y="992">invoke model</text>

  <line class="arrow" x1="1000" y1="1000" x2="1000" y2="975"/>
  <text class="label" x="1014" y="986">text/JSON response</text>

  <line class="arrow" x1="880" y1="840" x2="820" y2="350"/>
  <text class="label" x="830" y="560">actions, subgoals, rules</text>

  <line class="arrow" x1="880" y1="900" x2="820" y2="900"/>
  <text class="label" x="835" y="887">action char</text>

  <line class="arrow" x1="820" y1="420" x2="1320" y2="420"/>
  <text class="label" x="1010" y="407">POST /init and /action</text>

  <line class="arrow" x1="1320" y1="455" x2="820" y2="455"/>
  <text class="label" x="1010" y="472">board, level, status, message</text>

  <line class="arrow" x1="820" y1="905" x2="1320" y2="905"/>
  <text class="label" x="1010" y="892">POST /action</text>

  <line class="arrow" x1="1320" y1="940" x2="820" y2="940"/>
  <text class="label" x="1010" y="957">updated board/state</text>

  <line class="arrow" x1="1570" y1="510" x2="1570" y2="540"/>
  <text class="label" x="1584" y="530">dispatch into engine</text>

  <line class="arrow" x1="1570" y1="850" x2="1570" y2="880"/>
  <text class="label" x="1584" y="872">store session snapshots</text>

  <line class="arrow" x1="1570" y1="1000" x2="1570" y2="1030"/>
  <text class="label" x="1584" y="1019">format payloads</text>

  <line class="arrow" x1="1820" y1="470" x2="1860" y2="235"/>
  <text class="label" x="1830" y="340">append logs</text>

  <line class="arrow" x1="820" y1="620" x2="1860" y2="395"/>
  <text class="label" x="1290" y="500">read/write learned rules</text>

  <line class="arrow" x1="1240" y1="885" x2="1860" y2="545"/>
  <text class="label" x="1500" y="720">reads API key</text>

  <line class="arrow-dashed" x1="1240" y1="650" x2="1320" y2="650"/>
  <text class="label" x="1248" y="637">analysis still grounded by engine outputs</text>

  <line class="arrow-dashed" x1="210" y1="480" x2="210" y2="510"/>
  <text class="label" x="224" y="500">optional manual play path</text>
</svg>
