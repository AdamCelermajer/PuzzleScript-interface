<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goal Recognition Results</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <h1>Goal Recognition Results</h1>
        <p id="run-summary">Loading experiment results...</p>
      </div>
      <div class="summary-grid" aria-label="Result counts">
        <div><span>Games</span><strong id="total-games">0</strong></div>
        <div><span>Human</span><strong id="total-human">0</strong></div>
        <div><span>LLM</span><strong id="total-llm">0</strong></div>
      </div>
    </header>

    <section class="toolbar" aria-label="Filters">
      <label>
        Search
        <input id="search-input" type="search" autocomplete="off" placeholder="game id or answer text">
      </label>
      <label>
        Model
        <select id="model-filter"></select>
      </label>
      <label>
        Evidence
        <select id="evidence-filter"></select>
      </label>
      <label>
        Input
        <select id="input-filter"></select>
      </label>
    </section>

    <div class="workspace">
      <aside class="game-list-panel" aria-label="Games">
        <div class="list-heading">
          <strong id="visible-count">0 games</strong>
          <span>selected from the run</span>
        </div>
        <div id="game-list" class="game-list"></div>
      </aside>

      <section id="game-detail" class="game-detail" aria-live="polite"></section>
    </div>
  </main>

  <script src="./app-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
